stages:
  - lint
  - test
  - build

lint:
  stage: lint
  image: golang:1.25
  script:
    - test -z "$(gofmt -l .)" || { gofmt -l .; exit 1; }
    - go vet ./...

test:
  stage: test
  image: golang:1.25
  services:
    - postgres:17-alpine
  variables:
    POSTGRES_DB: app
    POSTGRES_USER: app
    POSTGRES_PASSWORD: app
    DB_HOST: postgres:5432
    DB_NAME: app
    DB_USER: app
    DB_PASS: app
    SSL_MODE: disable
  script:
    - go test -race ./...

build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  script:
    - docker build -f Dockerfile.api -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" .
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

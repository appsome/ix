# Runtime-glue block (docs/DESIGN.md §6).
#
# The in-process + Postgres LISTEN/NOTIFY broker that backs gqlgen GraphQL
# subscriptions is imported from github.com/appsome/ix/runtime/pubsub. This
# block vendors only the project glue: a local pubsub package that picks the
# right broker (Postgres when a DSN is set, in-process otherwise), re-exports
# the Broker surface, and constructs it from main().
name: pubsub
version: 0.1.0
category: runtime-glue
summary: In-proc + Postgres LISTEN/NOTIFY broker backing GraphQL subscriptions.

requires:
  - graphql-server

runtime:
  module: github.com/appsome/ix/runtime
  version: v0.1.0
  packages: [pubsub]

vars:
  - { name: Module, from: module }   # generated project's go module path

files:
  # The project-side pubsub package: broker selection + re-exports.
  - { src: wire.go.tmpl, dest: internal/pubsub/wire.go }

patches:
  # Construct the broker at the wire-services anchor graphql-server ships in
  # cmd/api/main.go. The anchor contract provides shutdownCtx and dsn in scope.
  # A Postgres broker is selected because dsn is non-empty; pass the channels
  # your subscriptions publish on. Thread `broker` into resolver.New (see the
  # block's next-steps) to back Subscription resolvers.
  - file: cmd/api/main.go
    anchor: "// ix:wire-services"
    imports:
      - "{{.Module}}/internal/pubsub"
    insert: |
      broker, err := pubsub.NewBroker(shutdownCtx, dsn)
      if err != nil {
      	log.Fatalf("pubsub: %v", err)
      }
      defer func() { _ = broker.Close() }()
      _ = broker // thread into resolver.New to back Subscription resolvers

hooks:
  post_add:
    - "go mod tidy"
    - "echo 'Next: thread broker into resolver.New, then back your Subscription resolvers with broker.Subscribe(ctx, topic). Pass the topics you publish on as extra args to pubsub.NewBroker to enable cross-process NOTIFY.'"

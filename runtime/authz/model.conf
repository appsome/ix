# Default Casbin model for ix authorization: RBAC-with-domains + an inline ABAC
# condition. Projects can override this by passing a custom model to
# WithModel(...); the authz block vendors an editable copy for that purpose.
#
# Domains map to tenants so a role granted inside one tenant does not bleed into
# another. The `cond` attribute is an inline expression that lets policies
# express ABAC-style conditions (e.g. owner-only or country lists) without
# touching handler code.

[request_definition]
r = sub, dom, obj, act, cond

[policy_definition]
p = sub, dom, obj, act, cond, eft

[role_definition]
g = _, _, _

[policy_effect]
e = some(where (p.eft == allow)) && !some(where (p.eft == deny))

[matchers]
m = g(r.sub, p.sub, r.dom) && keyMatch2(r.obj, p.obj) && regexMatch(r.act, p.act) && eval(p.cond)
